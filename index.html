<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Staff Leave Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Staff Leave Manager</h1>

    <form id="leaveForm">
        <label>Name:</label><input type="text" id="name" required><br>
        <label>Staff ID:</label><input type="text" id="staffId" required><br>
        <label>Start Date:</label><input type="date" id="startDate" required><br>
        <label>End Date:</label><input type="date" id="endDate" required><br>
        <button type="submit">Apply Leave</button>
    </form>

    <h2>Submitted Leaves</h2>
    <ul id="leaveList"></ul>

    <script src="script.js"></script>
</body>

</html>
